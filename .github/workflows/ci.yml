name: SOSphere CI — Lint, Audit & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Security Audit ──────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=critical --omit=dev

  # ── Job 2: ESLint ──────────────────────────────────────
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # O-M1: intermediate cap of 300 warnings (long-term goal <100)
      - run: npx eslint src/app/ --max-warnings 1100

  # ── Job 3: Build ───────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # O-M4: write secrets to .env in a single masked step instead of
      # exposing them as step-level env vars (reduces surface for log leakage)
      - name: Create .env (secrets)
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
        shell: bash
      - run: npx vite build
