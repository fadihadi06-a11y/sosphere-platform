name: Build Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI on any branch
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.*'
      - 'package.json'
      - 'vite.config.*'
      - '.github/workflows/build-apk.yml'

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install npm dependencies
        run: npm ci

      - name: Create .env file from secrets
        # Same pattern as ci.yml — secrets written to masked step
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
        shell: bash

      - name: Build web bundle (vite)
        run: npx vite build

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with commit SHA
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/sosphere-debug-${{ github.sha }}.apk
          # Also create a stable "latest" filename
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/sosphere-debug-latest.apk
          ls -lh apk-output/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sosphere-debug-apk-${{ github.sha }}
          path: apk-output/sosphere-debug-*.apk
          retention-days: 30
          if-no-files-found: error

      # Only attach to a Release when running on a tag or manual dispatch
      - name: Create GitHub Release (on manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Debug APK — build ${{ github.run_number }}
          body: |
            Automated debug APK build.

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            Download `sosphere-debug-latest.apk` below and install on your phone.
            On Android: enable "Install unknown apps" for your file manager, then tap the APK.
          files: apk-output/sosphere-debug-*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
